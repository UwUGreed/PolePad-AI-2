name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: polepad
          POSTGRES_PASSWORD: polepad
          POSTGRES_DB: polepad_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install API deps
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r packages/shared-types/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run API tests
        env:
          DATABASE_URL: postgresql+asyncpg://polepad:polepad@localhost:5432/polepad_test
          REDIS_URL: redis://localhost:6379/0
          CV_SERVICE_URL: http://localhost:8001
          OCR_SERVICE_URL: http://localhost:8002
          IMAGE_STORAGE_BACKEND: local
          LOCAL_IMAGE_DIR: /tmp/polepad-test
        run: pytest apps/api/tests/ -v

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Build frontend
        working-directory: apps/web
        run: npm ci && npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build all services
        run: docker compose build --parallel

      - name: Smoke test
        run: |
          docker compose up -d
          sleep 30
          curl --fail http://localhost:8000/health || exit 1
          curl --fail http://localhost:8001/health || exit 1
          curl --fail http://localhost:8002/health || exit 1
          docker compose down -v
