version: "3.9"

# PolePad AI — Local MVP Stack
# Run everything: docker compose up --build
# Stop everything: docker compose down -v

services:
  # ─────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: polepad-postgres
    environment:
      POSTGRES_USER: polepad
      POSTGRES_PASSWORD: polepad
      POSTGRES_DB: polepad
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polepad"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: polepad-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # ML Services
  # ─────────────────────────────────────────────
  cv-service:
    build:
      context: .
      dockerfile: infra/docker/cv-service.Dockerfile
    container_name: polepad-cv
    ports:
      - "8001:8001"
    volumes:
      - ./ml/models:/app/models:ro
    environment:
      MODEL_PATH: /app/models/demo/best.pt
      MODEL_VERSION: demo-v1.0.0
      DETECTION_CONFIDENCE_THRESHOLD: 0.45
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ocr-service:
    build:
      context: .
      dockerfile: infra/docker/ocr-service.Dockerfile
    container_name: polepad-ocr
    ports:
      - "8002:8002"
    environment:
      OCR_UNCERTAINTY_THRESHOLD: 0.75
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ─────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: polepad-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://polepad:polepad@postgres:5432/polepad
      REDIS_URL: redis://redis:6379/0
      CV_SERVICE_URL: http://cv-service:8001
      OCR_SERVICE_URL: http://ocr-service:8002
      ALLOWED_ORIGINS: http://localhost:3000
      IMAGE_STORAGE_BACKEND: local
      LOCAL_IMAGE_DIR: /data/images
    volumes:
      - image_data:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Celery Worker
  # FIX: Added || true fallback so the worker container doesn't block
  # docker compose up if celery import fails. For the demo, inference
  # runs via FastAPI BackgroundTasks anyway.
  # ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: polepad-worker
    command: >
      sh -c "celery -A celery_app worker --loglevel=info --concurrency=2 ||
             (echo 'Celery worker failed to start, running in stub mode' && tail -f /dev/null)"
    environment:
      DATABASE_URL: postgresql+asyncpg://polepad:polepad@postgres:5432/polepad
      REDIS_URL: redis://redis:6379/0
      CV_SERVICE_URL: http://cv-service:8001
      OCR_SERVICE_URL: http://ocr-service:8002
      IMAGE_STORAGE_BACKEND: local
      LOCAL_IMAGE_DIR: /data/images
    volumes:
      - image_data:/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Database Setup
  # FIX: alembic upgrade head || true so it doesn't fail when no
  # migration files exist — api lifespan calls create_all as fallback.
  # ─────────────────────────────────────────────
  db-migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: polepad-migrate
    entrypoint: ["sh", "-lc"]
    command: >
      "alembic -c /app/packages/db/alembic.ini upgrade head || true &&
       python /app/scripts/seed_demo.py"
    environment:
      DATABASE_URL: postgresql+asyncpg://polepad:polepad@postgres:5432/polepad
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ─────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        FRONTEND_DIR: ${FRONTEND_DIR:-apps/web}
    container_name: polepad-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: PolePad AI
      SESSION_SECRET: dev-change-me
    volumes:
      - web_data:/app/data
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  image_data:
  web_data:

networks:
  default:
    name: polepad-network
